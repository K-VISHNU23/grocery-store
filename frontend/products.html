<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - FreshCart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (!localStorage.getItem("role")) {
  window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">🛒 FreshCart</h2>
  <input id="search" placeholder="Search products..." class="search-bar">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    <button onclick="toggleProfile()" class="profile-btn">👤</button>
  </div>
</header>

<!-- PROFILE DROPDOWN -->
<div id="profileBox" class="profile-box hidden">
  <h3 id="userName">Hello User</h3>
  <p id="userPhone"></p>
  <hr>
  <button onclick="viewOrders()">📦 My Orders</button>
  <button onclick="deleteAccount()">🗑 Delete Account</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- FILTERS -->
<section class="filters-section">
  <h2>Products</h2>
  <div class="filters">
    <input type="text" id="productSearch" placeholder="Search..." onkeyup="applyFilters()">
    
    <select id="categoryFilter" onchange="applyFilters()">
      <option value="">All Categories</option>
      <option value="fruits">Fruits</option>
      <option value="vegetables">Vegetables</option>
      <option value="dairy">Dairy</option>
      <option value="grains">Grains</option>
    </select>

    <select id="priceFilter" onchange="applyFilters()">
      <option value="">All Prices</option>
      <option value="50">Below ₹50</option>
      <option value="100">Below ₹100</option>
      <option value="500">Below ₹500</option>
    </select>
  </div>
</section>

<!-- PRODUCTS GRID -->
<section class="products-section">
  <div id="products" class="products-grid"></div>
</section>

<footer class="footer">
  <p>© 2026 FreshCart | 📞 +91 6382195807 | 📧 kvishnu1947@gmail.com</p>
</footer>

<script src="script.js"></script>
<script>
let allProducts = [];

async function loadProductsPage() {
  try {
    const res = await fetch("http://localhost:5000/api/products");
    allProducts = await res.json();
    applyFilters();
  } catch (err) {
    console.log("Using mock products");
    applyFilters();
  }
}

function applyFilters() {
  const search = document.getElementById("productSearch").value.toLowerCase();
  const category = document.getElementById("categoryFilter").value;
  const maxPrice = document.getElementById("priceFilter").value;

  let filtered = allProducts.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search);
    const matchCategory = !category || (p.category === category);
    const matchPrice = !maxPrice || (p.price <= parseInt(maxPrice));
    
    return matchSearch && matchCategory && matchPrice;
  });

  displayProducts(filtered);
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  if (products.length === 0) {
    container.innerHTML = "<p style='text-align:center;grid-column:1/-1;'>No products found</p>";
    return;
  }

  products.forEach(p => {
    container.innerHTML += `
      <div class="product-card" onclick="openProduct(${p.id})">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p class="price">₹${p.price}</p>
        <button class="btn-small" onclick="addToCart(${p.id}, event)">Add to Cart</button>
      </div>
    `;
  });
}

loadProductsPage();
updateCartCount();
loadProfile();
</script>
</body>
</html>
