<!DOCTYPE html>
<html>
<head>
  <title>FreshCart</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
if (!localStorage.getItem("role")) {
  window.location.href = "login.html";
}
</script>

<header class="navbar">
  <h1>🛒 FreshCart</h1>
  <input id="search" placeholder="Search products...">
  
  <div class="navbar-right">
    <button onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>

    <div class="profile">
      <button onclick="toggleProfile()" class="profile-btn">👤 Profile</button>

      <div id="profileBox" class="profile-box hidden">
        <h3 id="userName">Hello User</h3>
        <p id="userPhone"></p>

        <hr>

        <button onclick="viewOrders()">📦 My Orders</button>
        <button onclick="deleteAccount()">🗑 Delete Account</button>
        <button onclick="logout()">🚪 Logout</button>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <div id="products" class="products"></div>

  <div id="cart" class="cart hidden">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total ₹<span id="total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
