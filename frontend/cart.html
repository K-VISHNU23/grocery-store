<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - FreshCart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
if (!localStorage.getItem("role")) {
  window.location.href = "login.html";
}
</script>

<!-- NAVBAR -->
<header class="navbar">
  <h2 class="logo">🛒 FreshCart</h2>
  <input id="search" placeholder="Search products..." class="search-bar">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="products.html">Shop</a>
    <a href="cart.html">Cart</a>
    <button onclick="toggleProfile()" class="profile-btn">👤</button>
  </div>
</header>

<!-- CART SECTION -->
<section class="cart-section">
  <div class="cart-container">
    <h1>Shopping Cart</h1>

    <div id="emptyCart" class="empty-message">
      <p>Your cart is empty</p>
      <a href="products.html" class="btn-primary">Continue Shopping</a>
    </div>

    <div id="cartContent" style="display:none;">
      <table class="cart-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cartItems"></tbody>
      </table>

      <div class="cart-summary">
        <h3>Order Summary</h3>
        <p>Subtotal: ₹<span id="subtotal">0</span></p>
        <p>Shipping: ₹<span id="shipping">0</span></p>
        <p>Tax: ₹<span id="tax">0</span></p>
        <h2>Total: ₹<span id="totalPrice">0</span></h2>

        <button class="btn-primary" onclick="proceedToPayment()">Proceed to Payment</button>
        <button class="btn-secondary" onclick="window.location.href='products.html'">Continue Shopping</button>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <p>© 2026 FreshCart | 📞 +91 6382195807 | 📧 kvishnu1947@gmail.com</p>
</footer>

<script src="script.js"></script>
<script>
let cartItems = [];

async function loadCart() {
  const cartIds = JSON.parse(localStorage.getItem("cart")) || [];

  if (cartIds.length === 0) {
    document.getElementById("emptyCart").style.display = "block";
    document.getElementById("cartContent").style.display = "none";
    return;
  }

  try {
    const res = await fetch("http://localhost:5000/api/products");
    const allProducts = await res.json();

    cartItems = cartIds.map(id => {
      const product = allProducts.find(p => p.id == id);
      return {
        ...product,
        quantity: (cartItems.find(c => c.id == id)?.quantity || 1)
      };
    });

    displayCart();
  } catch (err) {
    console.log("Using mock cart");
  }
}

function displayCart() {
  const tableBody = document.getElementById("cartItems");
  tableBody.innerHTML = "";

  let subtotal = 0;

  cartItems.forEach((item, index) => {
    const itemTotal = item.price * item.quantity;
    subtotal += itemTotal;

    tableBody.innerHTML += `
      <tr>
        <td>
          <img src="${item.img}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;">
          ${item.name}
        </td>
        <td>₹${item.price}</td>
        <td>
          <button onclick="updateQuantity(${index}, -1)">-</button>
          <input type="number" value="${item.quantity}" style="width:50px;" readonly>
          <button onclick="updateQuantity(${index}, 1)">+</button>
        </td>
        <td>₹${itemTotal}</td>
        <td>
          <button onclick="removeFromCart(${index})" class="btn-danger">Remove</button>
        </td>
      </tr>
    `;
  });

  const shipping = subtotal > 500 ? 0 : 50;
  const tax = Math.round(subtotal * 0.05);
  const total = subtotal + shipping + tax;

  document.getElementById("subtotal").innerText = subtotal;
  document.getElementById("shipping").innerText = shipping;
  document.getElementById("tax").innerText = tax;
  document.getElementById("totalPrice").innerText = total;

  document.getElementById("emptyCart").style.display = "none";
  document.getElementById("cartContent").style.display = "block";
}

function updateQuantity(index, change) {
  cartItems[index].quantity += change;
  if (cartItems[index].quantity < 1) cartItems[index].quantity = 1;
  displayCart();
}

function removeFromCart(index) {
  cartItems.splice(index, 1);
  let cartIds = cartItems.map(c => c.id);
  localStorage.setItem("cart", JSON.stringify(cartIds));
  loadCart();
}

function proceedToPayment() {
  localStorage.setItem("cartTotal", document.getElementById("totalPrice").innerText);
  window.location.href = "payment.html";
}

loadCart();
updateCartCount();
loadProfile();
</script>
</body>
</html>
