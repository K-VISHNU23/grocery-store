services:
  mysql:
    image: mysql:8.0
    container_name: grocery-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: grocery
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - grocery-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_password"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: grocery-backend
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root_password
      DB_NAME: grocery
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - grocery-network

  frontend:
    image: vishnuk08/frontend:latest
    container_name: grocery-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - grocery-network

volumes:
  mysql_data:

networks:
  grocery-network:
    driver: bridge