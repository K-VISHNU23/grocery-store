name: Deploy Grocery App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: docker build -t vishnuk08/backend:latest ./backend

      - name: Build Frontend
        run: docker build -t vishnuk08/frontend:latest ./frontend

      - name: Push Images
        run: |
          docker push vishnuk08/backend:latest
          docker push vishnuk08/frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo kubectl rollout restart deployment backend
            sudo kubectl rollout restart deployment frontend
